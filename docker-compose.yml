services:
  postgres:
    image: postgres:16-alpine
    container_name: sdr-metrics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sdr_metrics
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sdr_metrics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
